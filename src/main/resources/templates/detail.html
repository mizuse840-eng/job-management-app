<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${company.name} + ' - 就活管理'">企業詳細</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">

        <a href="/" class="btn btn-outline-secondary mb-3">← 一覧に戻る</a>

        <!-- 企業基本情報 -->
        <div class="card mb-4">
            <div class="card-body">
                <h2 class="card-title" th:text="${company.name}"></h2>
                <p class="mb-1">
                    <strong>業界：</strong>
                    <span th:text="${company.industry != null ? company.industry : '-'}"></span>
                </p>
                <p class="mb-1">
                    <strong>職種：</strong>
                    <span th:text="${company.jobType != null ? company.jobType : '未設定'}"></span>
                </p>
                <p class="mb-1">
                    <strong>採用ページ：</strong>
                    <a th:if="${company.url != null and !company.url.isEmpty()}"
                       th:href="${company.url}" th:text="${company.url}" target="_blank"></a>
                    <span th:if="${company.url == null or company.url.isEmpty()}">-</span>
                </p>
                <p class="mb-0">
                    <strong>メモ：</strong>
                    <span th:text="${company.memo != null ? company.memo : '-'}"></span>
                </p>
            </div>
        </div>

        <!-- 履歴追加フォーム -->
        <h4>選考履歴を追加</h4>
        <form action="/history/add" method="post" class="d-flex gap-2 mb-4 align-items-center flex-wrap">
            <input type="hidden" name="companyId" th:value="${company.id}">
            <input type="date" name="eventDate" class="form-control w-auto" required>
            <select name="statusCategoryId" class="form-select w-auto" required>
                <option value="" disabled selected>ステータスを選択</option>
                <option th:each="s : ${selectionStatuses}"
                        th:value="${s.id}"
                        th:text="${s.categoryName}">
                </option>
            </select>
            <input type="text" name="detailMemo" class="form-control w-auto"
                   placeholder="メモ（例：面接官の雰囲気など）">
            <button type="submit" class="btn btn-success">追加</button>
        </form>

        <hr>

        <!-- 選考履歴一覧 -->
        <h4>選考履歴</h4>
        <div th:if="${#lists.isEmpty(company.selectionHistories)}" class="text-muted mb-3">
            まだ履歴がありません。
        </div>
        <ul class="list-group">
            <li th:each="history : ${company.selectionHistories}"
                class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <span th:text="${history.eventDate}"></span> -
                    <span class="badge text-bg-primary ms-1"
                          th:text="${history.status.categoryName}"></span>
                    <span th:if="${history.detailMemo != null and !history.detailMemo.isEmpty()}"
                          class="ms-2 text-muted small" th:text="${history.detailMemo}"></span>
                </div>
                <form action="/history/delete" method="post">
                    <input type="hidden" name="id" th:value="${history.id}">
                    <input type="hidden" name="companyId" th:value="${company.id}">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('削除しますか？')">削除</button>
                </form>
            </li>
        </ul>

    </div>
</body>

</html>
