<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>就活・インターン管理ダッシュボード</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <h1>就活・インターン管理</h1>

        <!-- 検索 + ステータスサマリー -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <form action="/" method="get" class="d-flex gap-2 align-items-center">
                <input type="text" name="keyword" class="form-control w-auto" placeholder="企業名で検索...">
                <button type="submit" class="btn btn-primary">検索</button>
                <a href="/" class="btn btn-outline-secondary">リセット</a>
            </form>
            <div class="d-flex gap-2 flex-wrap">
                <span th:each="s : ${selectionStatuses}"
                      class="badge rounded-pill fs-6 fw-normal"
                      th:classappend="${(statusSummary[s.categoryName] ?: 0) > 0 ? ' text-bg-primary' : ' text-bg-light text-muted border'}"
                      th:text="${s.categoryName + ' ' + (statusSummary[s.categoryName] ?: 0)}">
                </span>
            </div>
        </div>

        <!-- 企業登録フォーム -->
        <form action="/company/add" method="post" class="d-flex gap-2 mb-4 align-items-center flex-wrap">
            <input type="date" name="eventDate" class="form-control w-auto">
            <input type="text" name="name" class="form-control w-auto" placeholder="企業名" required>
            <select name="statusCategoryId" class="form-select w-auto">
                <option value="">状況を選択</option>
                <option th:each="s : ${selectionStatuses}"
                        th:value="${s.id}"
                        th:text="${s.categoryName}">
                </option>
            </select>
            <input type="text" name="jobType" class="form-control w-auto" placeholder="職種（任意）">
            <input type="text" name="memo" class="form-control w-auto" placeholder="メモ（面接内容など）">
            <button type="submit" class="btn btn-success">登録する</button>
        </form>

        <hr>

        <!-- 企業一覧 -->
        <ul class="list-group">
            <li th:each="company : ${companies}"
                class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div>
                    <!-- メイン情報（目立たせる） -->
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span class="text-muted small"
                              th:text="${!#lists.isEmpty(company.selectionHistories) ? company.selectionHistories[0].eventDate : '-'}">
                        </span>
                        <strong class="fs-5" th:text="${company.name}"></strong>
                        <span class="badge text-bg-primary"
                              th:if="${!#lists.isEmpty(company.selectionHistories)}"
                              th:text="${company.selectionHistories[0].status.categoryName}">
                        </span>
                        <span class="badge text-bg-secondary"
                              th:if="${#lists.isEmpty(company.selectionHistories)}">未登録</span>
                    </div>
                    <!-- サブ情報（少し見やすく） -->
                    <div class="d-flex gap-3 small text-secondary">
                        <span th:if="${company.jobType != null and !company.jobType.isEmpty()}"
                              th:text="'職種：' + ${company.jobType}"></span>
                        <span th:if="${company.industry != null and !company.industry.isEmpty()}"
                              th:text="'業界：' + ${company.industry}"></span>
                        <span th:if="${company.memo != null and !company.memo.isEmpty()}"
                              th:text="${company.memo}"></span>
                    </div>
                </div>

                <div class="d-flex gap-2 align-items-center">
                    <a th:href="@{/company/{id}(id=${company.id})}"
                       class="btn btn-warning btn-sm">詳細・更新</a>
                    <form action="/company/delete" method="post">
                        <input type="hidden" name="id" th:value="${company.id}">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('削除しますか？')">削除</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>
</body>

</html>
